name: safecity
description: SafeCity - Densidad poblacional en tiempo real

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Maps
  google_maps_flutter: ^2.5.3

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.14.0

  # State management
  flutter_riverpod: ^2.4.9

  # HTTP
  dio: ^5.4.0

  # Image picker
  image_picker: ^1.0.7

  # Location
  geolocator: ^11.0.0

  # UI extras
  cached_network_image: ^3.3.1
  flutter_animate: ^4.4.0
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
